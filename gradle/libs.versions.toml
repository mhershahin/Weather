socket-io-client = { group = "io.socket", name = "socket.io-client", version.ref = "socket-io" }
commons-net = { group = "commons-net", name = "commons-net", version.ref = "commons-net" }
okdownload = { group = "com.liulishuo.okdownload", name = "okdownload", version.ref = "okdownload" }
okdownload-sql = { group = "com.liulishuo.okdownload", name = "sqlite", version.ref = "okdownload" }

# Printer & Third Party
snapper = { group = "dev.chrisbanes.snapper", name = "snapper", version.ref = "snapper" }
sheets-compose-dialogs = { group = "com.maxkeppeler.sheets-compose-dialogs", name = "core", version.ref = "date-picker" }
mlkit-barcode-scanning = { group = "com.google.mlkit", name = "barcode-scanning", version.ref = "barcode-scanner" }
blurry = { group = "jp.wasabeef", name = "blurry", version.ref = "blur" }
leakcanary-android = { group = "com.squareup.leakcanary", name = "leakcanary-android", version.ref = "leakcanary" }

# Test
junit = { group = "junit", name = "junit", version.ref = "junit" }
androidx-test-ext-junit = { group = "androidx.test.ext", name = "junit", version.ref = "junit-ext" }
androidx-test-espresso-core = { group = "androidx.test.espresso", name = "espresso-core", version.ref = "espresso" }
androidx-compose-ui-test = { group = "androidx.compose.ui", name = "ui-test-junit4", version.ref = "compose" }

[bundles]
compose = [
    "androidx-compose-ui",
    "androidx-compose-ui-tooling-preview",
    "androidx-compose-material3",
    "androidx-compose-runtime",
    "androidx-activity-compose"
]
camera = [
    "androidx-camera-core",
    "androidx-camera-view",
    "androidx-camera-lifecycle",
    "androidx-camera-camera2"
]
retrofit = [
    "retrofit-core",
    "retrofit-converter-jackson",
    "retrofit-converter-scalars"
]

[plugins]
android-application = { id = "com.android.application" }
android-library = { id = "com.android.library" }
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }
hilt = { id = "com.google.dagger.hilt.android", version.ref = "hilt" }
kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
detekt = { id = "io.gitlab.arturbosch.detekt", version.ref = "detekt" }