[versions]
# SDK & App
sdk-min = "24"
sdk-target = "35"
sdk-compile = "36"
app-code = "1"
app-name = "1.0.19.1"
jvm = "21"

test-instrumentation-runner = "androidx.test.runner.AndroidJUnitRunner"


# Kotlin
kotlin = "2.2.10"  #update if have all tools for compose
coroutines = "1.11.0"
collections = "0.4.0"

# Gradle & Tools
gradle-plugin = "9.0.1"
desugar = "2.1.5"
grgit-gradle = "5.3.3"
r8 = "9.1.31"
detekt = "1.23.8"
ksp = "2.3.7"

# Google & Firebase
material = "1.13.0"
firebase-bom = "34.11.0"
hilt = "2.59.2"
hiltCompose = "1.3.0"
google-services = "4.4.4"
crashlytics-plugin = "3.0.6"
perf-plugin = "2.0.2"
firebase-perf = "22.0.4"
firebase-core = "21.1.1"
guava = "33.5.0-android"

# AndroidX
androidx-appcompat = "1.7.1"
androidx-ktx = "1.18.0"
androidx-constraintlayout = "2.2.1"
androidx-lifecycle = "2.10.0"
androidx-lifecycle-ext = "2.2.0"
androidx-navigation = "2.9.8"
androidx-nav-compose = "1.3.0"
androidx-datastore = "1.2.1"

# Compose
compose = "1.11.1"
compose-material3 = "1.4.0"
compose-constraint = "1.1.1"
accompanist-insets = "0.30.1"
accompanist-permissions = "0.37.3"
accompanist-pager = "0.36.0"

# Media & Camera
media3 = "1.10.0"
camerax = "1.6.0"
camerax-view = "1.6.0"
coil = "3.4.0"

# Networking & DI
retrofit = "3.0.0"
okhttp-bom = "5.3.2"
okhttp-logging = "5.3.2"
jackson = "2.13.5"
socket-io = "2.1.2"
commons-net = "3.13.0"
okdownload = "1.0.7"


# Hardware & UI
